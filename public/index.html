<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <link rel="canonical" href="https://crazynoodl.github.io/matchday/" />
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Matchday" />
    <meta property="og:description" content="Tournament & match tracker" />
    <meta property="og:image" content="https://crazynoodl.github.io/matchday/og-image.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Matchday" />
    <meta name="twitter:description" content="Tournament & match tracker" />
    <meta name="twitter:image" content="https://crazynoodl.github.io/matchday/og-image.png" />
    <script>
      // A shared-round link is copied as "<origin>/?shared=<id>" instead of
      // "<origin>/shared/<id>" so that GitHub Pages serves it as the real index.html
      // (HTTP 200, with the Open Graph tags above) instead of 404.html — some link
      // preview crawlers (e.g. Telegram) refuse to render a preview for a non-200
      // response even when its body has valid tags. Rewrite the URL to the path form
      // here, synchronously, before Expo Router's bundle loads and reads the pathname.
      (function () {
        var s = window.location.search;
        if (s.indexOf('?shared=') === 0) {
          var id = decodeURIComponent(s.slice('?shared='.length).split('&')[0]);
          var path = window.location.pathname.replace(/\/$/, '') + '/shared/' + id;
          window.history.replaceState(null, '', path + window.location.hash);
        }
      })();
    </script>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
