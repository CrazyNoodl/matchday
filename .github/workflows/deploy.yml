name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Patch dist for GitHub Pages SPA routing
        run: |
          cp public/404.html dist/404.html
          node -e "
            const fs = require('fs');
            const file = 'dist/index.html';
            const html = fs.readFileSync(file, 'utf8');
            const script = '<script>(function(l){if(l.search[1]===\"/\"){var d=l.search.slice(1).split(\"&\").map(function(s){return s.replace(/~and~/g,\"&\")});window.history.replaceState(null,null,l.pathname.slice(0,-1)+d[0]+(d[1]?\"?\"+d[1]:\"\")+l.hash)}}(window.location))<\/script>';
            fs.writeFileSync(file, html.replace('<head>', '<head>' + script));
          "

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
